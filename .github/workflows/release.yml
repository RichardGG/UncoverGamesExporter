on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

name: Release Build

jobs:
  build:
    runs-on: windows-2025
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Create EnvironmentDetails.cs
        run: |
          $content = @"
            namespace UncoverGamesExporter
            {
                internal static class EnvironmentDetails
                {
                    public const string ClientId = "${{ secrets.CLIENT_ID }}";
                    public const string ClientSecret = "${{ secrets.CLIENT_SECRET }}";
                }
            }
          "@
          Set-Content -Path "${{ github.workspace }}\EnvironmentDetails.cs" -Value $content -Encoding UTF8

      - name: Setup Nuget.exe
        uses: NuGet/setup-nuget@v1

      - name: Nuget Restore 
        run: nuget restore .\UncoverGamesExporter.sln

      - name: Build (DotNET4.6.2)
        run: |
          cd "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\"
          .\MSBuild.exe "${{ github.workspace }}\UncoverGamesExporter.sln" -p:Configuration=Release -restore

      - name: Setup Playnite
        run: |
          Invoke-WebRequest -Uri "https://github.com/JosefNemec/Playnite/releases/download/10.55/Playnite10.55.7z" -OutFile "${{ github.workspace }}\Playnite.7z"
          Expand-Archive "${{ github.workspace }}\Playnite.7z" -DestinationPath "${{ github.workspace }}\Playnite"

      - name: Pack with Playnite
        run: |
          cd "${{ github.workspace }}\Playnite"
          ls "${{ github.workspace }}"
          ls "${{ github.workspace }}\Playnite"
          ls
          .\Toolbox.exe pack "${{ github.workspace }}\Source\bin\Release\" "${{ github.workspace }}\Toolbox\"
          cd "${{ github.workspace }}\Toolbox"
          Get-ChildItem -Filter *.pext | Rename-Item -NewName "UncoverGamesExporter_${{ github.ref_name }}.pext"

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          prerelease: false
          files: |
            Toolbox/*.pext